<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ارزیابی سریع شنوایی</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap');

  :root{
    --navy-950:#0B1426;
    --navy-900:#111F3B;
    --navy-800:#192B52;
    --navy-700:#223666;
    --gold-500:#C9A24B;
    --gold-300:#E3C783;
    --cream-100:#F4EFE3;
    --ink-mute:#9FAAC4;
    --alert:#D9785F;
    --ok:#6FA88A;
    --radius:16px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 20% -10%, var(--navy-800), var(--navy-950) 60%);
    color:var(--cream-100);
    font-family:'Vazirmatn',sans-serif;
    min-height:100vh;
    padding:32px 16px 56px;
    display:flex;
    justify-content:center;
  }

  .wrap{width:100%;max-width:560px;}

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }

  .brand{display:flex;align-items:center;gap:10px;}
  .brand svg{flex-shrink:0;}
  .brand-text{display:flex;flex-direction:column;line-height:1.35;}
  .brand-text strong{font-weight:700;font-size:16px;}
  .brand-text span{font-size:12px;color:var(--ink-mute);}

  .mode-toggle{
    display:flex;
    background:var(--navy-900);
    border:1px solid var(--navy-700);
    border-radius:999px;
    padding:4px;
  }
  .mode-toggle button{
    border:none;
    background:transparent;
    color:var(--ink-mute);
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    padding:8px 18px;
    border-radius:999px;
    cursor:pointer;
    transition:background .2s,color .2s;
  }
  .mode-toggle button.active{
    background:var(--gold-500);
    color:var(--navy-950);
  }

  .audiogram-wrap{
    background:var(--navy-900);
    border:1px solid var(--navy-700);
    border-radius:var(--radius);
    padding:14px 14px 6px;
    margin-bottom:20px;
  }
  .audiogram-wrap svg{width:100%;height:auto;display:block;}
  .audiogram-caption{
    text-align:center;
    font-size:12px;
    color:var(--ink-mute);
    margin:6px 0 4px;
    letter-spacing:.2px;
  }

  main{min-height:280px;}

  .screen{animation:rise .35s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .card{
    background:var(--navy-900);
    border:1px solid var(--navy-700);
    border-radius:var(--radius);
    padding:24px 22px;
  }

  .eyebrow{
    font-size:12px;
    color:var(--gold-300);
    font-weight:600;
    letter-spacing:.3px;
    margin:0 0 10px;
  }

  .q-text{
    font-size:18px;
    font-weight:600;
    line-height:1.7;
    margin:0 0 20px;
  }

  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    text-align:right;
    background:var(--navy-800);
    border:1.5px solid var(--navy-700);
    color:var(--cream-100);
    font-family:inherit;
    font-size:14.5px;
    border-radius:12px;
    padding:14px 16px;
    cursor:pointer;
    transition:border-color .15s,background .15s;
  }
  .opt:hover{border-color:var(--gold-500);}
  .opt:focus-visible{outline:2px solid var(--gold-300);outline-offset:2px;}
  .opt.selected{
    border-color:var(--gold-500);
    background:linear-gradient(0deg, rgba(201,162,75,.18), rgba(201,162,75,.18)), var(--navy-800);
  }

  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
  }
  .btn-ghost{
    background:transparent;
    border:1.5px solid var(--navy-700);
    color:var(--ink-mute);
    font-family:inherit;
    font-size:13.5px;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
  }
  .btn-ghost:disabled{opacity:.4;cursor:not-allowed;}
  .btn-ghost:not(:disabled):hover{border-color:var(--gold-500);color:var(--cream-100);}

  .btn-primary{
    background:var(--gold-500);
    border:none;
    color:var(--navy-950);
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    padding:11px 24px;
    border-radius:10px;
    cursor:pointer;
    transition:filter .15s;
  }
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary:not(:disabled):hover{filter:brightness(1.08);}

  .field-label{
    display:block;
    font-size:13px;
    color:var(--ink-mute);
    margin-bottom:6px;
  }
  .field-input{
    width:100%;
    background:var(--navy-800);
    border:1.5px solid var(--navy-700);
    color:var(--cream-100);
    font-family:inherit;
    font-size:14.5px;
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:16px;
  }
  .field-input:focus-visible{outline:2px solid var(--gold-300);outline-offset:1px;}

  .consent{
    display:flex;
    align-items:flex-start;
    gap:10px;
    font-size:12.5px;
    color:var(--ink-mute);
    line-height:1.6;
    margin-bottom:18px;
  }
  .consent input{margin-top:3px;accent-color:var(--gold-500);}

  .result-badge{
    display:inline-block;
    font-size:12px;
    font-weight:700;
    padding:5px 12px;
    border-radius:999px;
    margin-bottom:12px;
  }
  .result-title{font-size:19px;font-weight:700;margin:0 0 10px;}
  .result-msg{font-size:14.5px;line-height:1.8;color:var(--cream-100);margin:0 0 22px;}
  .result-actions{display:flex;flex-direction:column;gap:10px;}
  .btn-wa{
    background:var(--ok);
    border:none;
    color:var(--navy-950);
    font-family:inherit;
    font-weight:700;
    font-size:14.5px;
    padding:13px;
    border-radius:10px;
    cursor:pointer;
    text-decoration:none;
    text-align:center;
    display:block;
  }
  .btn-call{
    background:transparent;
    border:1.5px solid var(--gold-500);
    color:var(--gold-300);
    font-family:inherit;
    font-weight:600;
    font-size:14px;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    text-align:center;
    display:block;
  }
  .restart-link{
    display:block;
    text-align:center;
    margin-top:18px;
    font-size:12.5px;
    color:var(--ink-mute);
    background:none;
    border:none;
    text-decoration:underline;
    cursor:pointer;
    font-family:inherit;
  }

  footer.disclaimer{
    margin-top:22px;
    font-size:11.5px;
    color:var(--ink-mute);
    text-align:center;
    line-height:1.7;
  }

  @media (prefers-reduced-motion:reduce){
    .screen{animation:none;}
    *{transition:none !important;}
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="brand">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
        <circle cx="17" cy="17" r="16" stroke="#C9A24B" stroke-width="1.4"/>
        <path d="M11 18c0-5 3-9 6-9s6 3 6 6-3 4-3 8c0 2-2 3-4 2" stroke="#E3C783" stroke-width="1.6" stroke-linecap="round" fill="none"/>

  </footer>
</div>

const FA_DIGITS = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
function toFa(n){ return String(n).split('').map(c => /[0-9]/.test(c) ? FA_DIGITS[c] : c).join(''); }

const QUESTIONS = {
  adult: [

child: [
    { text:"سن فرزند شما چقدر است؟", options:[
      {label:"زیر ۱ سال",score:0},{label:"۱ تا ۳ سال",score:0},{label:"۳ تا ۶ سال",score:0},{label:"بالای ۶ سال",score:0}]},

    { text:"آیا فرزندتان به‌صورت زودرس (نارس) یا با نیاز به بستری در بخش مراقبت‌های ویژه نوزادان (NICU) به دنیا آمده است؟", options:[
      {label:"بله، بیش از ۵ روز در NICU بستری بوده",score:2},

    { text:"آیا فرزندتان دچار زردی شدید نوزادی بوده که نیاز به فتوتراپی طولانی یا تعویض خون داشته باشد؟", options:[

    { text:"آیا در خانواده نزدیک (والدین، خواهر/برادر، پدربزرگ/مادربزرگ) فردی با کم‌شنوایی از بدو تولد یا دوران کودکی وجود دارد؟", options:[

      {label:"بله",score:2},{label:"خیر",score:0},{label:"نمی‌دانم",score:0}]},

    { text:"آیا فرزندتان ناهنجاری در سر و صورت (مثل ناهنجاری گوش خارجی، لب یا کام شکاف‌دار) یا یک سندرم شناخته‌شده دارد؟", options:[
      {label:"بله",score:2},{label:"خیر",score:0},{label:"نمی‌دانم",score:0}]},

    { text:"آیا فرزندتان تا به حال داروهای اوتوتوکسیک (مضر برای گوش، مانند برخی آنتی‌بیوتیک‌های تزریقی یا داروهای شیمی‌درمانی) دریافت کرده است؟", options:[
      {label:"بله",score:2},{label:"خیر",score:0},{label:"نمی‌دانم",score:0}]},

    { text:"آیا فرزندتان سابقه مننژیت باکتریایی داشته است؟", options:[

    { text:"تا به حال چند بار فرزندتان دچار عفونت گوش میانی یا ترشح از گوش شده است؟", options:[
      {label:"سه بار یا بیشتر، یا عفونت مزمن/طول‌کشیده",score:2},
      {label:"یک تا دو بار",score:1},
      {label:"هرگز",score:0}]},

    { text:"وقتی نام فرزندتان را از فاصله ۲ تا ۳ متری و بدون اینکه چهره شما را ببیند صدا می‌زنید، آیا واکنش نشان می‌دهد؟", options:[

    { text:"آیا فرزندتان هنگام مکالمه یا تماشای تلویزیون به‌طور محسوسی به دهان طرف مقابل خیره می‌شود (رفتار لب‌خوانی)؟", options:[
      {label:"بله",score:2},{label:"گاهی",score:1},{label:"خیر",score:0}]},

    { text:"در حال حاضر چقدر نگران وضعیت شنوایی فرزندتان هستید؟", options:[
      {label:"خیلی نگرانم، می‌خواهم زود ارزیابی شود",score:3,urgent:true},
      {label:"کمی نگرانم، اطلاعات بیشتر می‌خواهم",score:1},
      {label:"فقط برای اطمینان پرسیدم",score:0}]}

const MAX_SCORE = { adult:16, child:18 };

let state = {
  mode: 'adult',
  index: 0,
  answers: [],   // {optionIndex, score, urgent, flagChild}
  screen: 'quiz', // quiz | lead | result
  lead: { name:'', phone:'', consent:false }
};

const screenHost = document.getElementById('screenHost');
const modeAdultBtn = document.getElementById('modeAdultBtn');
const modeChildBtn = document.getElementById('modeChildBtn');

function setMode(mode){
  if(state.mode === mode) return;
  state = { mode, index:0, answers:[], screen:'quiz', lead:{name:'',phone:'',consent:false} };
  modeAdultBtn.classList.toggle('active', mode==='adult');
  modeAdultBtn.setAttribute('aria-selected', mode==='adult');
  modeChildBtn.classList.toggle('active', mode==='child');
  modeChildBtn.setAttribute('aria-selected', mode==='child');
  render();
}
modeAdultBtn.addEventListener('click', ()=>setMode('adult'));
modeChildBtn.addEventListener('click', ()=>setMode('child'));

function currentQuestions(){ return QUESTIONS[state.mode]; }

function selectOption(qIndex, optIndex){
  const opt = currentQuestions()[qIndex].options[optIndex];
  state.answers[qIndex] = { optionIndex: optIndex, score: opt.score, urgent: !!opt.urgent, flagChild: !!opt.flagChild };
  render();
}

function goNext(){
  const qs = currentQuestions();
  if(state.answers[state.index] === undefined) return;
  if(state.index < qs.length - 1){
    state.index += 1;
  } else {
    state.screen = 'lead';
  }
  render();
}
function goPrev(){
  if(state.screen === 'lead'){ state.screen = 'quiz'; render(); return; }
  if(state.index > 0){ state.index -= 1; render(); }
}

function totalScore(){
  return state.answers.reduce((sum,a)=> sum + (a ? a.score : 0), 0);
}
function isUrgent(){
  return state.answers.some(a => a && a.urgent);
}
function childFlagged(){
  return state.answers.some(a => a && a.flagChild);
}
function getTier(){
  if(isUrgent()) return 'urgent';
  const ratio = totalScore() / MAX_SCORE[state.mode];
  if(ratio >= 0.55) return 'high';
  if(ratio >= 0.25) return 'medium';
  return 'low';
}

const TIER_CONTENT = {
  adult: {
    urgent: { badge:'نیاز به پیگیری فوری', color:'var(--alert)', title:'بهتر است هرچه زودتر ارزیابی شوید',

    high: { badge:'چند نشانه قابل‌توجه', color:'var(--alert)', title:'چند نشانه نگران‌کننده ثبت شد',

      msg:'بر اساس پاسخ‌های شما، توصیه می‌کنیم در اولین فرصت ارزیابی شنوایی برای فرزندتان انجام شود. تیم ما می‌تواند برای هماهنگی نوبت تماس بگیرد.' },
    high: { badge:'چند نشانه قابل‌توجه', color:'var(--alert)', title:'چند نشانه نگران‌کننده ثبت شد',
      msg:'پاسخ‌های شما چند نشانه‌ی قابل‌توجه را نشان می‌دهد، به‌ویژه در حوزه رشد گفتاری و واکنش به صدا. پیشنهاد می‌کنیم زودتر ارزیابی شنوایی انجام شود.' },
    medium: { badge:'نشانه‌های جزئی', color:'var(--gold-500)', title:'چند نشانه‌ی جزئی وجود دارد',
      msg:'برخی نشانه‌های خفیف در پاسخ‌های شما دیده می‌شود. ارزیابی شنوایی در آینده نزدیک می‌تواند خاطرتان را راحت کند.' },
    low: { badge:'فعلاً آرام', color:'var(--ok)', title:'نشانه نگران‌کننده‌ای ثبت نشد',
      msg:'در حال حاضر علائم قابل‌توجهی ثبت نشد. اگر هر کدام از علائم بالا در آینده تشدید شد، ارزیابی شنوایی را فراموش نکنید.' }
  }
};

function buildWhatsAppMessage(){
  const modeLabel = state.mode === 'adult' ? 'بزرگسال' : 'کودک';
  const tier = TIER_CONTENT[state.mode][getTier()];
  const lines = [
    `سلام، پرسشنامه آنلاین شنوایی (${modeLabel}) تکمیل شد.`,
    `نام: ${state.lead.name}`,
    `شماره تماس: ${state.lead.phone}`,
    `نتیجه غربالگری: ${tier.badge}`
  ];
  if(childFlagged()){
    lines.push('توجه: نگرانی از وضعیت شنوایی فرزند هم ابراز شده — پیگیری پرسشنامه کودک نیز پیشنهاد می‌شود.');
  }
  lines.push('لطفاً جهت هماهنگی نوبت ارزیابی پیگیری شود.');
  return lines.join('\n');
}

function sendToSheet(){
  if(!CONFIG.googleSheetUrl || CONFIG.googleSheetUrl.indexOf('PASTE_') === 0) return;
  const tier = TIER_CONTENT[state.mode][getTier()];
  const payload = {
    mode: state.mode === 'adult' ? 'بزرگسال' : 'کودک',
    name: state.lead.name,
    phone: state.lead.phone,
    score: totalScore(),
    maxScore: MAX_SCORE[state.mode],
    tier: tier.badge,
    childFlag: childFlagged() ? 'بله' : 'خیر'
  };
  fetch(CONFIG.googleSheetUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  }).catch(()=>{ /* خطای شبکه را نادیده می‌گیریم تا تجربه کاربر مختل نشود */ });
}

// ---------- رندر بخش‌ها ----------
function render(){
  renderAudiogram();
  if(state.screen === 'quiz') renderQuiz();
  else if(state.screen === 'lead') renderLead();
  else renderResult();
}

function renderQuiz(){
  const qs = currentQuestions();
  const q = qs[state.index];
  const answer = state.answers[state.index];

  const optionsHtml = q.options.map((opt,i) => `
    <button type="button" class="opt ${answer && answer.optionIndex===i ? 'selected':''}" data-i="${i}">
      ${opt.label}
    </button>`).join('');

  screenHost.innerHTML = `
    <div class="screen card">
      <p class="eyebrow">سوال ${toFa(state.index+1)} از ${toFa(qs.length)}</p>
      <p class="q-text">${q.text}</p>
      <div class="options">${optionsHtml}</div>
      <div class="nav-row">
        <button type="button" class="btn-ghost" id="prevBtn" ${state.index===0 ? 'disabled':''}>قبلی</button>
        <button type="button" class="btn-primary" id="nextBtn" ${answer===undefined ? 'disabled':''}>
          ${state.index === qs.length-1 ? 'مشاهده نتیجه' : 'بعدی'}
        </button>
      </div>
    </div>`;

  screenHost.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click', ()=> selectOption(state.index, Number(btn.dataset.i)));
  });
  document.getElementById('prevBtn').addEventListener('click', goPrev);
  document.getElementById('nextBtn').addEventListener('click', goNext);
}

function renderLead(){
  screenHost.innerHTML = `
    <div class="screen card">
      <p class="eyebrow">یک قدم تا نتیجه</p>
      <p class="q-text">برای دریافت نتیجه و پیگیری، اطلاعات تماس را وارد کنید</p>

      <label class="field-label" for="nameInput">نام و نام خانوادگی</label>
      <input class="field-input" id="nameInput" type="text" value="${state.lead.name}" placeholder="مثلاً: مریم احمدی">

      <label class="field-label" for="phoneInput">شماره موبایل</label>
      <input class="field-input" id="phoneInput" type="tel" value="${state.lead.phone}" placeholder="۰۹xxxxxxxxx">

      <label class="consent">
        <input type="checkbox" id="consentInput" ${state.lead.consent ? 'checked':''}>
        <span>با ثبت این فرم، رضایت برای تماس کلینیک جهت پیگیری نتیجه را می‌دهم.</span>
      </label>

      <div class="nav-row">
        <button type="button" class="btn-ghost" id="prevBtn">قبلی</button>
        <button type="button" class="btn-primary" id="submitBtn" disabled>دریافت نتیجه</button>
      </div>
    </div>`;

  const nameInput = document.getElementById('nameInput');
  const phoneInput = document.getElementById('phoneInput');
  const consentInput = document.getElementById('consentInput');
  const submitBtn = document.getElementById('submitBtn');

  function validate(){
    state.lead.name = nameInput.value.trim();
    state.lead.phone = phoneInput.value.trim();
    state.lead.consent = consentInput.checked;
    submitBtn.disabled = !(state.lead.name && state.lead.phone.length >= 8 && state.lead.consent);
  }
  [nameInput, phoneInput].forEach(el => el.addEventListener('input', validate));
  consentInput.addEventListener('change', validate);

  document.getElementById('prevBtn').addEventListener('click', goPrev);
  submitBtn.addEventListener('click', ()=>{ sendToSheet(); state.screen = 'result'; render(); });
}

function renderResult(){
  const tier = TIER_CONTENT[state.mode][getTier()];
  const waLink = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(buildWhatsAppMessage())}`;
  const telLink = `tel:${CONFIG.phoneNumber}`;

  screenHost.innerHTML = `
    <div class="screen card">
      <span class="result-badge" style="background:${tier.color};color:var(--navy-950);">${tier.badge}</span>
      <h3 class="result-title">${tier.title}</h3>
      <p class="result-msg">${tier.msg}</p>
      <div class="result-actions">
        <a class="btn-wa" href="${waLink}" target="_blank" rel="noopener">ارسال نتیجه به واتساپ کلینیک</a>
        <a class="btn-call" href="${telLink}">تماس مستقیم با ${CONFIG.clinicName}</a>
      </div>
      <button type="button" class="restart-link" id="restartBtn">شروع دوباره</button>
    </div>`;

  document.getElementById('restartBtn').addEventListener('click', ()=>{
    state.index = 0; state.answers = []; state.screen='quiz';
    state.lead = { name:'', phone:'', consent:false };
    render();
  });
}

// ---------- نمودار شبیه‌سازی شده "نقشه نگرانی" (به سبک ادیوگرام) ----------
function renderAudiogram(){
  const svg = document.getElementById('audiogramSvg');
  const caption = document.getElementById('audiogramCaption');
  const total = currentQuestions().length;
  const W = 440, H = 150, padX = 28, topY = 18, bottomY = 118;
  const stepX = (W - padX*2) / (total - 1);

  let grid = '';
  [0,1,2,3].forEach(i=>{
    const y = topY + i*(bottomY-topY)/3;
    grid += `<line x1="${padX}" y1="${y}" x2="${W-padX}" y2="${y}" stroke="#223666" stroke-width="1"/>`;
  });

  let points = [];
  for(let i=0;i<total;i++){
    const a = state.answers[i];
    const x = padX + i*stepX;
    if(a !== undefined){
      const maxQScore = i === total-1 ? 3 : 2;
      const y = topY + (a.score/maxQScore) * (bottomY-topY);
      points.push({x,y,answered:true});
    } else {
      points.push({x,y:topY,answered:false});
    }
  }

  const answeredPts = points.filter(p=>p.answered);
  let pathD = '';
  if(answeredPts.length){
    pathD = 'M ' + answeredPts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' L ');
  }

  let dots = points.map((p,i)=>{
    if(p.answered){
      return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.5" fill="#C9A24B"/>`;
    }
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="none" stroke="#3A4A78" stroke-width="1.2"/>`;
  }).join('');

  let labels = points.map((p,i)=>{
    const active = i === state.index && state.screen==='quiz';
    return `<text x="${p.x.toFixed(1)}" y="${bottomY+22}" font-size="10" text-anchor="middle" fill="${active?'#E3C783':'#5B6A93'}" font-family="Vazirmatn, sans-serif">${toFa(i+1)}</text>`;
  }).join('');

  svg.innerHTML = `
    ${grid}
    ${pathD ? `<path d="${pathD}" fill="none" stroke="#C9A24B" stroke-width="2"/>` : ''}
    ${dots}
    ${labels}
  `;

  const score = totalScore();
  if(score === 0 && state.answers.filter(Boolean).length === 0){
    caption.textContent = 'نقشه نگرانی بر اساس پاسخ‌های شما';
  } else {
    caption.textContent = `سطح نگرانی فعلی: ${toFa(score)} از ${toFa(MAX_SCORE[state.mode])}`;
  }
}

render();
</script>
